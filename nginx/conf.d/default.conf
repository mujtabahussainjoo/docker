upstream fastcgi_backend {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name localhost;
    set $MAGE_ROOT /var/www/html;
    set $MAGE_MODE developer;
    root $MAGE_ROOT/pub;

    index index.php;
    autoindex off;
    charset UTF-8;
    error_page 404 403 = /errors/404.php;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location /static/ {
        expires max;

        location ~* ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }

        location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|swf|webp|avif)$ {
            add_header Cache-Control "public";
            expires +1y;
            try_files $uri $uri/ /static.php?resource=$uri&$args;
        }

        location ~* \.(zip|gz|gzip|bz2|csv|xml)$ {
            add_header Cache-Control "no-store";
            expires off;
            try_files $uri $uri/ /static.php?resource=$uri&$args;
        }

        if (!-f $request_filename) {
            rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last;
        }
    }

    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;

        location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|swf|webp|avif)$ {
            add_header Cache-Control "public";
            expires +1y;
            try_files $uri $uri/ /get.php$is_args$args;
        }
    }

    location /media/customer/ {
        deny all;
    }

    location /media/downloadable/ {
        deny all;
    }

    location /media/import/ {
        deny all;
    }

    location /errors/ {
        location ~* \.xml$ {
            deny all;
        }
    }

    location ~ ^/(index|get|static|report|404|503|health_check)\.php$ {
        try_files $uri =404;
        fastcgi_pass fastcgi_backend;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 1800s;
        fastcgi_connect_timeout 1800s;
        fastcgi_param PHP_FLAG "session.auto_start=off \n suhosin.session.cryptua=off";
        fastcgi_param PHP_VALUE "memory_limit=2G \n max_execution_time=1800";
        fastcgi_param MAGE_MODE $MAGE_MODE;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.php$ {
        deny all;
    }

    location /.user.ini {
        deny all;
    }

    location ~* (composer\.(json|lock)|auth\.json|nginx\.conf\.sample|gruntfile\.js|package\.json|package-lock\.json|README\.md|CHANGELOG\.md|LICENSE|phpunit\.xml|\.git) {
        deny all;
    }
}