upstream php_fpm_mydemo1 {
    server php-fpm:9000;
}

server {
    listen 80;
    server_name mydemo1.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mydemo1.local;

    ssl_certificate     /etc/nginx/ssl/mydemo1.local.crt;
    ssl_certificate_key /etc/nginx/ssl/mydemo1.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    set $MAGE_ROOT /var/www/html/mydemo1;
    set $MAGE_MODE developer;
    root $MAGE_ROOT/pub;
    index index.php;
    autoindex off;
    charset UTF-8;
    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location /static/ {
        expires max;
        location ~* ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }
        if (!-f $request_filename) {
            rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last;
        }
    }

    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;
    }

    location /media/customer/ { deny all; }
    location /media/downloadable/ { deny all; }
    location /media/import/ { deny all; }

    location ~ ^/(index|get|static|report|404|503|health_check)\.php$ {
        try_files $uri =404;
        fastcgi_pass php_fpm_mydemo1;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 1800s;
        fastcgi_param PHP_VALUE "memory_limit=2G \n max_execution_time=1800";
        fastcgi_param MAGE_MODE $MAGE_MODE;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.php$ { deny all; }
    location /.user.ini { deny all; }
}